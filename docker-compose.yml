services:
  postgres:
    image: postgres:15-alpine
    container_name: wps_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whatsapp_summarizer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: wps_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/whatsapp_summarizer
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      JWT_EXPIRES_IN: 7d
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1:8b
      PORT: 3000
      SESSIONS_DIR: /sessions
    ports:
      - "3000:3000"
    volumes:
      - sessions_data:/sessions
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  sessions_data:
